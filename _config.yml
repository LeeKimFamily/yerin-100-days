# Jekyll configuration for GitHub Pages
title: "예린이의 100일 초대장"
description: "예린이의 100일 파티 초대장"
author: "이상민, 김민경"
email: ""

# GitHub Pages settings
baseurl: "/yerin-100-days"
url: "https://lsmlsming.github-io"

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima

# Collections
collections:
  - photo

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - .gitignore
